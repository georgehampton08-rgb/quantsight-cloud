name: Data Integrity Verification

on:
  schedule:
    # Run at 10 AM UTC daily (after all US games from the previous night are firmly concluded)
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of past days to check'
        required: true
        default: '1'

env:
  PROJECT_ID: quantsight-prod

jobs:
  verify-data:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Integrity Verification
      env:
        FIREBASE_PROJECT_ID: ${{ env.PROJECT_ID }}
      run: |
        DAYS=${{ github.event.inputs.days || '1' }}
        echo "Running data integrity verification for the last $DAYS day(s)..."
        python backend/scripts/verify_game_data.py --days $DAYS
